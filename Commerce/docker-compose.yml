services:
  db:
    image: postgres:15-alpine
    container_name: commerce-db
    environment:
      POSTGRES_DB: commerce_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend/commerce
    container_name: commerce-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/commerce_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: adminpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    volumes:
      - ./backend/commerce/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: commerce-frontend
    ports:
      - "5173:80" # Mapeamos el puerto 80 del contenedor al 5173 local para consistencia
    depends_on:
      - backend

volumes:
  postgres_data:
